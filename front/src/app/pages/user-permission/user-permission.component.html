<div class="max-w-xl mx-auto p-6 bg-white dark:bg-gray-900 rounded-2xl shadow">

  <h2 class="text-xl font-bold mb-4">Gestion des permissions</h2>

  <!-- Recherche utilisateur -->
  <div class="mb-4">
    <label class="text-sm text-gray-600">Username ou email</label>
    <div class="flex gap-2 mt-1">
      <input
        [(ngModel)]="query"
        class="w-full px-3 py-2 border rounded-lg dark:bg-gray-800"
        placeholder="john.doe@email.com"
      />
      <button
        class="px-4 py-2 bg-blue-600 text-white rounded-lg"
        (click)="searchUser()"
      >
        Rechercher
      </button>
    </div>
  </div>

  <!-- Infos utilisateur -->
  <div *ngIf="user" class="mb-4 p-3 bg-gray-100 dark:bg-gray-800 rounded">
    <p class="text-sm"><b>Utilisateur :</b> {{ user.username }}</p>
    <p class="text-sm"><b>Email :</b> {{ user.email }}</p>
  </div>

  <!-- Permissions -->
<div *ngIf="user" class="mb-4">
  <label class="text-sm text-gray-600">Permission</label>
  <select [(ngModel)]="selectedPermissionId" class="border p-2 rounded w-full">
    <option 
      *ngFor="let p of permissions" 
      [value]="p.id"
      [ngStyle]="{color: hasPermission(p.id) ? '#9ca3af' : '#111827', 
        fontStyle: hasPermission(p.id) ? 'italic' : 'normal'
      }"
    >
      {{ p.name }} <span *ngIf="hasPermission(p.id)">✔</span>
    </option>
  </select>
</div>

  <!-- Actions -->
  <div *ngIf="user" class="flex gap-3">
    <button
      class="flex-1 bg-green-600 text-white py-2 rounded-lg"
      (click)="assignPermission()"
    >
      ➕ Assigner
    </button>

    <button
      class="flex-1 bg-red-600 text-white py-2 rounded-lg"
      (click)="removePermission()"
    >
      ➖ Retirer
    </button>
  </div>

  <!-- Messages -->
  <p *ngIf="message" class="mt-3 text-green-600 text-sm">{{ message }}</p>
  <p *ngIf="error" class="mt-3 text-red-600 text-sm">{{ error }}</p>

</div>
