<app-page-breadcrumb pageTitle="Livres"></app-page-breadcrumb>

<div class="grid grid-cols-1 gap-5 sm:grid-cols-2 xl:grid-cols-4 justify-items-center w-full">
  <div *ngFor="let book of books; trackBy: trackById" class="flex justify-center w-full">
    <app-card
      class="mx-auto max-w-sm"
      [title]="book.title"
      [desc]="book.description"
      [bookId]="book.id"

    >
      <app-book-item [imageUrl]="book.cover_url"></app-book-item>
    </app-card>
  </div>
</div>
<!-- Pagination -->
<div class="flex justify-center gap-4 mt-8 items-center">
  <button
    class="px-4 py-2 rounded bg-gray-200 dark:bg-gray-700"
    (click)="prevPage()"
    [disabled]="page === 1"
  >
    ← Précédent
  </button>

  <input
    type="number"
    class="w-16 text-center rounded border px-2 py-1"
    [value]="page"
    (change)="goToPage($event.target.value)"
    [min]="1"
    [max]="totalPages"
  />

  <span class="text-sm text-gray-500">/ {{ totalPages }}</span>

  <button
    class="px-4 py-2 rounded bg-gray-200 dark:bg-gray-700"
    (click)="nextPage()"
    [disabled]="page === totalPages"
  >
    Suivant →
  </button>
</div>
