<div *ngIf="stats" class="grid grid-cols-12 gap-4 md:gap-6">
  <div class="col-span-12 space-y-6 xl:col-span-7">
    <div><app-monthly-chart [data]="stats.loans_by_month"/></div>
    <div><app-metrics [metrics]="stats.metrics"/></div>
  </div>

  <div class="col-span-12 xl:col-span-5">
    <app-monthly-target [value]="stats.on_time_return_rate"/>
  </div>
</div>
