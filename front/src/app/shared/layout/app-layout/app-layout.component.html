<div class="min-h-screen flex flex-col xl:flex-row">
  <!-- Sidebar + Backdrop -->
  <div>
    <app-sidebar />
    <app-app-backdrop />
  </div>

  <!-- Contenu principal -->
  <div
    class="flex flex-col flex-1 transition-all duration-300 ease-in-out"
    [ngClass]="{
      'xl:ml-[290px]': (isExpanded$ | async) || (isHovered$ | async),
      'xl:ml-[90px]': !(isExpanded$ | async) && !(isHovered$ | async),
      'ml-0': (isMobileOpen$ | async)
    }"
  >
    <!-- Header -->
    <app-app-header />

    <!-- Contenu dynamique -->
    <div class="flex-1 p-4 mx-auto max-w-(--breakpoint-2xl) md:p-6 w-full mt-16">
      
      <router-outlet></router-outlet>
    </div>

    <!-- Footer -->
      <app-app-footer />
  </div>
</div>
