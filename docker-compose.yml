services:
  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile.dev
    container_name: ptut_front
    ports:
      - "4200:4200"
    volumes:
      - ./front:/app
      - /app/node_modules
    command: ["npm", "run", "start", "--", "--host", "0.0.0.0"]

